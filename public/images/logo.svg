<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" fill="none">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon: Traffic light style marker -->
  <g transform="translate(5, 5)">
    <rect x="12" y="0" width="16" height="40" rx="4" fill="url(#logoGradient)"/>
    <circle cx="20" cy="10" r="4" fill="#ef4444"/>
    <circle cx="20" cy="20" r="4" fill="#f59e0b"/>
    <circle cx="20" cy="30" r="4" fill="#22c55e"/>
  </g>

  <!-- Text: Multando -->
  <text x="55" y="35" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#2563eb">
    Multando
  </text>
</svg>
